<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial;
    background:#eef2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.modal{
    background:white;
    padding:40px;
    width:450px;
    border-radius:15px;
    text-align:center;
}
button{
    margin:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
}
.red{
    background:crimson;
    color:white;
}
.gray{
    background:#ddd;
}
</style>
</head>
<body>
<div class="modal">
    <h2>Eliminar empresa</h2>
    <p>¿Seguro que deseas eliminar esta empresa?</p>
    <button class="red">Eliminar</button>
    <button class="gray">Cancelar</button>
</div>
</body>
</html>
