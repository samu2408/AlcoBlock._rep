<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - ALCOBLOCK</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
        }

        .left{
            width:50%;
            background:#1f3b5b;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:40px;
        }

        .logo{
            width:120px;
            height:120px;
            background:white;
            border-radius:50%;
            margin-bottom:25px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#1f3b5b;
            font-weight:bold;
        }

        .left h1{
            font-size:52px;
            margin-bottom:20px;
        }

        .left p{
            font-size:22px;
            max-width:500px;
            line-height:1.5;
        }

        .right{
            width:50%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:430px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        .login-box h2{
            margin-bottom:10px;
            color:#1f3b5b;
        }

        .login-box p{
            color:#666;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .options{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
            font-size:14px;
        }

        .options a{
            text-decoration:none;
            color:#2563eb;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#1f3b5b;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            margin-bottom:15px;
        }

        .btn:hover{
            background:#284d75;
        }

        .support{
            text-align:center;
            font-size:14px;
            color:#666;
        }
    </style>
</head>
<body>

    <div class="left">
        <div class="logo">LOGO</div>
        <h1>ALCOBLOCK</h1>
        <p>Sistema inteligente de prevención de conducción bajo efectos del alcohol</p>
    </div>

    <div class="right">
        <div class="login-box">
            <h2>Bienvenido</h2>
            <p>Inicia sesión para acceder al sistema</p>

            <input type="email" placeholder="Correo electrónico">
            <input type="password" placeholder="Contraseña">

            <div class="options">
                <label><input type="checkbox" style="width:auto;"> Recordar</label>
                <a href="#">Olvidé mi contraseña</a>
            </div>

            <button class="btn">Iniciar sesión</button>

            <div class="support">
                Contactar soporte
            </div>
        </div>
    </div>

</body>
</html>
