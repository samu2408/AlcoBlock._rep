<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:15px;
}
input{
    width:100%;
    padding:14px;
    margin:12px 0;
}
button{
    width:100%;
    padding:14px;
    background:#1f3b5b;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>
<body>
<div class="box">
    <h2>Nueva contraseña</h2>
    <input type="password" placeholder="Nueva contraseña">
    <input type="password" placeholder="Confirmar contraseña">
    <button>Guardar</button>
</div>
</body>
</html>
