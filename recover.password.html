<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña - ALCOBLOCK</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            width:450px;
            background:white;
            padding:40px;
            border-radius:16px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        h1{
            color:#1f3b5b;
            margin-bottom:15px;
        }

        p{
            color:#666;
            margin-bottom:25px;
            line-height:1.5;
        }

        input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
            margin-bottom:12px;
        }

        .primary{
            background:#1f3b5b;
            color:white;
        }

        .secondary{
            background:#e5e7eb;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Recuperar contraseña</h1>
        <p>Ingresa tu correo corporativo para enviarte un código de recuperación.</p>

        <input type="email" placeholder="Correo electrónico">

        <button class="primary">Enviar código</button>
        <button class="secondary">Volver al login</button>
    </div>
</body>
</html>
