<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Empresa - ALCOBLOCK</title>
<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}
.box{
    background:white;
    max-width:800px;
    margin:auto;
    padding:40px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}
h1{
    color:#1f3b5b;
}
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:25px;
}
input, select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
}
.buttons{
    margin-top:30px;
    display:flex;
    gap:15px;
}
button{
    padding:14px 24px;
    border:none;
    border-radius:8px;
}
.primary{
    background:#1f3b5b;
    color:white;
}
.secondary{
    background:#ddd;
}
</style>
</head>
<body>
<div class="box">
    <h1>Registrar Empresa</h1>

    <div class="grid">
        <input placeholder="NIT">
        <input placeholder="Nombre empresa">
        <input placeholder="Sector">
        <input placeholder="Dirección">
        <input placeholder="Teléfono">
        <input placeholder="Email corporativo">
        <select>
            <option>Activa</option>
            <option>Inactiva</option>
        </select>
    </div>

    <div class="buttons">
        <button class="primary">Guardar</button>
        <button class="secondary">Cancelar</button>
    </div>
</div>
</body>
</html>
