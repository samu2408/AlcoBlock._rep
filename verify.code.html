<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificar código</title>
<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:40px;
    width:420px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}
input{
    width:100%;
    padding:14px;
    margin:20px 0;
}
button{
    width:100%;
    padding:14px;
    background:#1f3b5b;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>
<body>
<div class="box">
    <h2>Verificación</h2>
    <p>Ingresa el código enviado a tu correo.</p>
    <input placeholder="Código de 6 dígitos">
    <button>Validar código</button>
</div>
</body>
</html>
